<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Håndball</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--surface:#161a22;--card:#1e2430;--border:#2a3040;
  --accent:#e8321a;--a2:#f7931e;--green:#22c55e;--blue:#3b82f6;--purple:#8b5cf6;
  --text:#f0f2f5;--muted:#6b7a94;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--bg);color:var(--text);font-family:var(--fb);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 16px;
}

/* Subtle grid background */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
  background-size:40px 40px;opacity:.3;pointer-events:none;
}

.wrap{position:relative;z-index:1;width:100%;max-width:420px;}

/* LOGO */
.logo{text-align:center;margin-bottom:40px;}
.logo-text{
  font-family:var(--fd);font-weight:900;font-size:2.8rem;letter-spacing:.06em;
  line-height:1;text-transform:uppercase;
}
.logo-text span{color:var(--accent);}
.logo-sub{
  font-family:var(--fd);font-weight:600;font-size:.85rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--muted);margin-top:6px;
}

/* CARDS */
.cards{display:flex;flex-direction:column;gap:12px;}

.card{
  display:flex;align-items:center;gap:16px;
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:18px 20px;text-decoration:none;color:var(--text);
  transition:transform .15s,border-color .15s,background .15s;
  cursor:pointer;
}
.card:hover{transform:translateY(-2px);background:#252d3d;}
.card:active{transform:scale(.98);}

.card-icon{
  font-size:2rem;width:52px;height:52px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.card-icon.stats {background:rgba(232,50,26,.15);border:1px solid rgba(232,50,26,.3);}
.card-icon.trening{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);}
.card-icon.taktikk{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.3);}

.card-text{flex:1;}
.card-title{
  font-family:var(--fd);font-weight:800;font-size:1.25rem;letter-spacing:.04em;
  text-transform:uppercase;margin-bottom:3px;
}
.card-desc{font-size:.82rem;color:var(--muted);line-height:1.4;}

.card-arrow{color:var(--muted);font-size:1.1rem;flex-shrink:0;}

/* accent lines */
.card:hover .card-arrow{color:var(--text);}
.card-stats   .card-title{color:var(--accent);}
.card-trening .card-title{color:var(--green);}
.card-taktikk .card-title{color:var(--purple);}
.card-stats  {border-left:3px solid var(--accent);}
.card-trening{border-left:3px solid var(--green);}
.card-taktikk{border-left:3px solid var(--purple);}

/* FOOTER */
.footer{margin-top:32px;text-align:center;font-size:.74rem;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
</style>
</head>
<body>

<div class="wrap">

  <div class="logo">
    <div class="logo-text">HÅNDBALL<span>APP</span></div>
    <div class="logo-sub">Verktøy for trenere</div>
  </div>

  <div class="cards">

    <a class="card card-stats" href="handball_stats.html">
      <div class="card-icon stats">📊</div>
      <div class="card-text">
        <div class="card-title">Statistikk</div>
        <div class="card-desc">Kampregistrering, skuddsoner, keeperstatistikk og totalstatistikk</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a class="card card-trening" href="trening.html">
      <div class="card-icon trening">🏋</div>
      <div class="card-text">
        <div class="card-title">Trening</div>
        <div class="card-desc">Lag øvelser og sett dem sammen til treningsplaner</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

    <a class="card card-taktikk" href="taktikk.html">
      <div class="card-icon taktikk">🎯</div>
      <div class="card-text">
        <div class="card-title">Taktikk</div>
        <div class="card-desc">Registrer og organiser trekk, formasjoner og spillsituasjoner</div>
      </div>
      <span class="card-arrow">›</span>
    </a>

  </div>

  <div class="footer">Alle data lagres lokalt i nettleseren</div>

</div>

</body>
</html>
