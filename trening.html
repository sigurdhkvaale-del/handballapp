<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treningsplanlegger</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--surface:#161a22;--card:#1e2430;--border:#2a3040;
  --accent:#e8321a;--a2:#f7931e;--green:#22c55e;--red:#ef4444;
  --blue:#3b82f6;--yellow:#eab308;--purple:#8b5cf6;--teal:#14b8a6;
  --text:#f0f2f5;--muted:#6b7a94;
  --fd:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;}
header{background:var(--surface);border-bottom:2px solid var(--accent);padding:0 14px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;gap:10px;}
.logo{font-family:var(--fd);font-weight:800;font-size:1.15rem;letter-spacing:.04em;white-space:nowrap;}
.logo span{color:var(--accent);}
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;font-family:var(--fd);font-weight:700;font-size:.8rem;letter-spacing:.05em;padding:5px 12px;text-transform:uppercase;text-decoration:none;white-space:nowrap;}
.back-btn:hover{border-color:var(--muted);}
.tabs{display:flex;gap:3px;}
.tab{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--fd);font-size:.78rem;font-weight:700;letter-spacing:.05em;padding:4px 12px;border-radius:4px;cursor:pointer;transition:all .15s;text-transform:uppercase;}
.tab.on,.tab:hover{background:var(--accent);border-color:var(--accent);color:#fff;}

main{padding:14px;max-width:860px;margin:0 auto;}
.page{display:none;} .page.on{display:block;}

/* BUTTONS */
.btn{background:var(--accent);border:none;border-radius:4px;color:#fff;cursor:pointer;font-family:var(--fd);font-weight:700;font-size:.82rem;letter-spacing:.05em;padding:7px 14px;text-transform:uppercase;transition:opacity .15s;white-space:nowrap;}
.btn:hover{opacity:.85;}
.sec{background:var(--card)!important;border:1px solid var(--border)!important;color:var(--text)!important;}
.dng{background:var(--red)!important;}
.grn{background:var(--green)!important;}
.blu{background:var(--blue)!important;}
.ylw{background:var(--yellow)!important;color:#111!important;}
.teal{background:var(--teal)!important;}

/* FORMS */
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.form-row input,.form-row select,.form-row textarea{background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--fb);font-size:.86rem;padding:7px 9px;flex:1;min-width:120px;transition:border-color .15s;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{outline:none;border-color:var(--accent);}
.form-row textarea{resize:vertical;min-height:70px;}
.form-row select option{background:var(--surface);}
.label{font-family:var(--fd);font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}

/* SECTION */
.stitle{font-family:var(--fd);font-size:1rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.ss{margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:8px;}

/* CATEGORY BADGE */
.cat{display:inline-block;font-family:var(--fd);font-weight:700;font-size:.72rem;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-right:6px;}
.cat-oppvarming{background:rgba(234,179,8,.2);color:var(--yellow);}
.cat-teknikk{background:rgba(59,130,246,.2);color:var(--blue);}
.cat-taktikk{background:rgba(139,92,246,.2);color:var(--purple);}
.cat-fysisk{background:rgba(34,197,94,.2);color:var(--green);}
.cat-avslutning{background:rgba(247,147,30,.2);color:var(--a2);}
.cat-kamp{background:rgba(232,50,26,.2);color:var(--accent);}

/* DRILL CARD */
.drill-card{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:11px 13px;margin-bottom:7px;}
.drill-title{font-family:var(--fd);font-weight:800;font-size:.98rem;margin-bottom:3px;}
.drill-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px;}
.drill-desc{font-size:.84rem;color:var(--muted);line-height:1.4;}
.drill-actions{display:flex;gap:5px;margin-top:8px;}

/* PLAN BUILDER */
.plan-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:10px;}
.plan-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.plan-title{font-family:var(--fd);font-weight:800;font-size:1.05rem;}
.plan-meta{font-size:.78rem;color:var(--muted);font-family:var(--fd);}
.plan-drill-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:.85rem;}
.plan-drill-row:last-child{border-bottom:none;}
.plan-drill-num{font-family:var(--fd);font-weight:700;font-size:.8rem;color:var(--muted);min-width:20px;}
.plan-drill-info{flex:1;}
.plan-drill-dur{font-family:var(--fd);font-weight:700;font-size:.82rem;color:var(--a2);white-space:nowrap;}
.drag-handle{cursor:grab;color:var(--muted);padding:0 4px;user-select:none;font-size:1rem;}
.drag-handle:active{cursor:grabbing;}

/* DRILL PICKER */
.picker-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.picker-btn{background:var(--bg);border:2px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer;font-family:var(--fd);font-weight:700;font-size:.78rem;padding:6px 10px;transition:all .12s;}
.picker-btn:hover,.picker-btn.on{border-color:var(--blue);background:rgba(59,130,246,.15);}

/* TOTAL TIME */
.total-time{background:rgba(247,147,30,.1);border:1px solid var(--a2);border-radius:6px;padding:8px 14px;font-family:var(--fd);font-weight:700;font-size:.9rem;color:var(--a2);margin-bottom:12px;display:flex;align-items:center;gap:8px;}

/* POPUP */
.pop{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;align-items:center;justify-content:center;}
.pop.on{display:flex;}
.pb{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;width:min(480px,96vw);max-height:90vh;overflow-y:auto;}
.pb h3{font-family:var(--fd);font-weight:800;font-size:1rem;letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;text-align:center;}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:8px 16px;font-family:var(--fd);font-weight:700;font-size:.88rem;z-index:300;transition:transform .25s;pointer-events:none;white-space:nowrap;}
.toast.on{transform:translateX(-50%) translateY(0);}

.empty{color:var(--muted);font-size:.88rem;padding:16px 0;text-align:center;}
</style>
</head>
<body>

<header>
  <div class="logo">HÅNDBALL<span>TRENING</span></div>
  <div class="tabs">
    <button class="tab on" onclick="goTab('oevelser')">Øvelser</button>
    <button class="tab" onclick="goTab('planer')">Treningsplaner</button>
  </div>
  <a class="back-btn" href="handball_stats.html">← Statistikk</a>
</header>

<main>

<!-- ØVELSER -->
<div id="tab-oevelser" class="page on">
  <div class="ss">
    <div class="stitle">Legg til øvelse</div>
    <div class="card">
      <div class="form-row">
        <div style="flex:2;min-width:140px;">
          <div class="label">Navn</div>
          <input type="text" id="dName" placeholder="Navn på øvelsen">
        </div>
        <div style="flex:1;min-width:110px;">
          <div class="label">Kategori</div>
          <select id="dCat">
            <option value="oppvarming">Oppvarming</option>
            <option value="teknikk">Teknikk</option>
            <option value="taktikk">Taktikk</option>
            <option value="fysisk">Fysisk</option>
            <option value="kamp">Kampsituasjon</option>
            <option value="avslutning">Avslutning</option>
          </select>
        </div>
        <div style="flex:1;min-width:90px;">
          <div class="label">Varighet (min)</div>
          <input type="number" id="dDur" placeholder="10" min="1" max="120" style="max-width:90px;">
        </div>
        <div style="flex:1;min-width:90px;">
          <div class="label">Antall spillere</div>
          <input type="text" id="dPlayers" placeholder="f.eks. 6-10" style="max-width:100px;">
        </div>
      </div>
      <div class="form-row">
        <div style="flex:1;">
          <div class="label">Beskrivelse / gjennomføring</div>
          <textarea id="dDesc" placeholder="Beskriv øvelsen, antall spillere, oppsett..."></textarea>
        </div>
      </div>
      <div class="form-row">
        <div style="flex:1;">
          <div class="label">Coaching-tips (valgfritt)</div>
          <input type="text" id="dTips" placeholder="Fokuspunkter, nøkkelord...">
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn grn" onclick="saveDrill()">+ Lagre øvelse</button>
        <button class="btn sec" onclick="clearDrillForm()">Tøm</button>
      </div>
      <input type="hidden" id="dEditId" value="">
    </div>
  </div>

  <div class="ss">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px;">
      <div class="stitle" style="margin-bottom:0;border:none;">Lagrede øvelser</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
        <select id="filterCat" onchange="renderDrills()" style="background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--fd);font-size:.78rem;padding:4px 8px;">
          <option value="">Alle kategorier</option>
          <option value="oppvarming">Oppvarming</option>
          <option value="teknikk">Teknikk</option>
          <option value="taktikk">Taktikk</option>
          <option value="fysisk">Fysisk</option>
          <option value="kamp">Kampsituasjon</option>
          <option value="avslutning">Avslutning</option>
        </select>
        <input type="text" id="searchDrill" oninput="renderDrills()" placeholder="Søk..." style="background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--fb);font-size:.82rem;padding:5px 9px;width:120px;">
      </div>
    </div>
    <div id="drillList"></div>
  </div>
</div>

<!-- TRENINGSPLANER -->
<div id="tab-planer" class="page">
  <div class="ss">
    <div class="stitle">Ny treningsplan</div>
    <div class="card">
      <div class="form-row">
        <div style="flex:2;min-width:140px;">
          <div class="label">Navn på treningsøkt</div>
          <input type="text" id="pName" placeholder="f.eks. Tirsdagstrening uke 12">
        </div>
        <div style="flex:1;min-width:100px;">
          <div class="label">Dato</div>
          <input type="date" id="pDate">
        </div>
      </div>
      <div class="form-row">
        <div style="flex:1;">
          <div class="label">Mål for treningsøkten</div>
          <input type="text" id="pGoal" placeholder="Hva skal fokuset være?">
        </div>
      </div>

      <div class="label" style="margin-bottom:6px;">Øvelser i planen</div>
      <div id="planDrillList" style="margin-bottom:8px;min-height:40px;"></div>
      <button class="btn blu" onclick="openDrillPicker()" style="margin-bottom:8px;">+ Legg til øvelse</button>

      <div id="planTotalTime" class="total-time" style="display:none;">
        ⏱ Total varighet: <span id="totalMin">0</span> min
      </div>

      <div style="display:flex;gap:8px;">
        <button class="btn grn" onclick="savePlan()">💾 Lagre plan</button>
        <button class="btn sec" onclick="clearPlanForm()">Tøm</button>
      </div>
      <input type="hidden" id="pEditId" value="">
    </div>
  </div>

  <div class="ss">
    <div class="stitle">Lagrede planer</div>
    <div id="planList"></div>
  </div>
</div>

</main>

<!-- DRILL PICKER POPUP -->
<div class="pop" id="pickerPop">
  <div class="pb">
    <h3>Velg øvelse</h3>
    <div class="form-row" style="margin-bottom:10px;">
      <input type="text" id="pickerSearch" oninput="renderPicker()" placeholder="Søk...">
      <select id="pickerCat" onchange="renderPicker()" style="background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--fd);font-size:.82rem;padding:6px 8px;">
        <option value="">Alle</option>
        <option value="oppvarming">Oppvarming</option>
        <option value="teknikk">Teknikk</option>
        <option value="taktikk">Taktikk</option>
        <option value="fysisk">Fysisk</option>
        <option value="kamp">Kampsituasjon</option>
        <option value="avslutning">Avslutning</option>
      </select>
    </div>
    <div id="pickerGrid"></div>
    <div style="text-align:center;margin-top:10px;">
      <button class="btn sec" onclick="closePop('pickerPop')">Avbryt</button>
    </div>
  </div>
</div>

<!-- PLAN VIEW POPUP -->
<div class="pop" id="planViewPop">
  <div class="pb">
    <h3 id="planViewTitle"></h3>
    <div id="planViewContent"></div>
    <div style="text-align:center;margin-top:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
      <button class="btn blu" onclick="printPlan()">🖨 Skriv ut</button>
      <button class="btn sec" onclick="closePop('planViewPop')">Lukk</button>
    </div>
  </div>
</div>

<!-- CONFIRM POPUP -->
<div class="pop" id="confirmPop">
  <div class="pb" style="max-width:300px;">
    <h3 id="confirmMsg" style="font-size:.95rem;text-transform:none;letter-spacing:0;margin-bottom:16px;font-weight:700;"></h3>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn grn" id="confirmYes">✓ Ja</button>
      <button class="btn sec" id="confirmNo">✕ Nei</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LS_DRILLS = 'hbs_drills';
const LS_PLANS  = 'hbs_plans';
const CAT_LABELS = {
  oppvarming:'Oppvarming', teknikk:'Teknikk', taktikk:'Taktikk',
  fysisk:'Fysisk', kamp:'Kampsituasjon', avslutning:'Avslutning'
};

const uid = () => Math.random().toString(36).slice(2)+Date.now().toString(36);
const lsGet = k => { try{ return JSON.parse(localStorage.getItem(k)||'[]'); }catch{ return []; } };
const lsSet = (k,v) => localStorage.setItem(k,JSON.stringify(v));

// Current plan being built
let currentPlanDrills = []; // [{drillId, customDur}]

// ── NAVIGATION ──
function goTab(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  document.querySelectorAll('.tab').forEach(t=>{
    if(t.textContent.toLowerCase().startsWith(name.slice(0,3))) t.classList.add('on');
  });
  if(name==='oevelser') renderDrills();
  if(name==='planer') { renderPlanDrillList(); renderPlans(); }
}

// ── CONFIRM DIALOG ──
function confirmDlg(msg, onYes) {
  document.getElementById('confirmMsg').textContent=msg;
  openPop('confirmPop');
  const y=document.getElementById('confirmYes'), n=document.getElementById('confirmNo');
  const ny=y.cloneNode(true), nn=n.cloneNode(true);
  y.replaceWith(ny); n.replaceWith(nn);
  document.getElementById('confirmYes').addEventListener('click',()=>{ closePop('confirmPop'); onYes(); },{once:true});
  document.getElementById('confirmNo').addEventListener('click',()=>closePop('confirmPop'),{once:true});
}

// ── DRILLS ──
function saveDrill() {
  const name=document.getElementById('dName').value.trim();
  if(!name){ toast('Navn er påkrevd'); return; }
  const editId=document.getElementById('dEditId').value;
  const drill={
    id: editId||uid(),
    name,
    cat: document.getElementById('dCat').value,
    dur: parseInt(document.getElementById('dDur').value)||10,
    players: document.getElementById('dPlayers').value.trim(),
    desc: document.getElementById('dDesc').value.trim(),
    tips: document.getElementById('dTips').value.trim()
  };
  const drills=lsGet(LS_DRILLS);
  if(editId) {
    const idx=drills.findIndex(d=>d.id===editId);
    if(idx>=0) drills[idx]=drill; else drills.push(drill);
  } else drills.push(drill);
  lsSet(LS_DRILLS,drills);
  clearDrillForm();
  renderDrills();
  toast(editId?'✏ Øvelse oppdatert':'✅ Øvelse lagret');
}

function clearDrillForm() {
  ['dName','dDesc','dTips','dEditId','dPlayers'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('dDur').value='';
  document.getElementById('dCat').value='oppvarming';
}

function editDrill(id) {
  const d=lsGet(LS_DRILLS).find(d=>d.id===id); if(!d) return;
  document.getElementById('dName').value=d.name;
  document.getElementById('dCat').value=d.cat;
  document.getElementById('dDur').value=d.dur;
  document.getElementById('dPlayers').value=d.players||'';
  document.getElementById('dDesc').value=d.desc||'';
  document.getElementById('dTips').value=d.tips||'';
  document.getElementById('dEditId').value=d.id;
  document.getElementById('dName').focus();
  goTab('oevelser');
  window.scrollTo({top:0,behavior:'smooth'});
  toast('✏ Redigerer: '+d.name);
}

function deleteDrill(id) {
  const d=lsGet(LS_DRILLS).find(d=>d.id===id); if(!d) return;
  confirmDlg('Slett "'+d.name+'"?', ()=>{
    lsSet(LS_DRILLS, lsGet(LS_DRILLS).filter(x=>x.id!==id));
    renderDrills(); toast('🗑 Slettet');
  });
}

function renderDrills() {
  const drills=lsGet(LS_DRILLS);
  const fCat=document.getElementById('filterCat').value;
  const search=document.getElementById('searchDrill').value.toLowerCase();
  const el=document.getElementById('drillList');
  let list=drills;
  if(fCat) list=list.filter(d=>d.cat===fCat);
  if(search) list=list.filter(d=>d.name.toLowerCase().includes(search)||(d.desc||'').toLowerCase().includes(search));
  if(!list.length){ el.innerHTML='<div class="empty">Ingen øvelser funnet.</div>'; return; }
  el.innerHTML=list.map(d=>`
    <div class="drill-card">
      <div class="drill-meta">
        <span class="cat cat-${d.cat}">${CAT_LABELS[d.cat]||d.cat}</span>
        <span style="font-size:.78rem;color:var(--muted);font-family:var(--fd);">⏱ ${d.dur} min</span>
        ${d.players?`<span style="font-size:.78rem;color:var(--muted);font-family:var(--fd);">👥 ${d.players} sp.</span>`:''}
      </div>
      <div class="drill-title">${d.name}</div>
      ${d.desc?`<div class="drill-desc">${d.desc}</div>`:''}
      ${d.tips?`<div style="margin-top:5px;font-size:.8rem;color:var(--teal);"><strong>Tips:</strong> ${d.tips}</div>`:''}
      <div class="drill-actions">
        <button class="btn sec" style="padding:4px 10px;font-size:.75rem;" data-edit="${d.id}">✏ Rediger</button>
        <button class="btn dng" style="padding:4px 9px;font-size:.75rem;" data-del="${d.id}">🗑</button>
      </div>
    </div>`).join('');
  el.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>editDrill(b.dataset.edit)));
  el.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>deleteDrill(b.dataset.del)));
}

// ── PLAN BUILDER ──
function renderPlanDrillList() {
  const el=document.getElementById('planDrillList');
  const drills=lsGet(LS_DRILLS);
  if(!currentPlanDrills.length){ el.innerHTML='<div style="color:var(--muted);font-size:.84rem;padding:4px 0;">Ingen øvelser lagt til ennå.</div>'; updateTotalTime(); return; }
  el.innerHTML=currentPlanDrills.map((item,i)=>{
    const d=drills.find(x=>x.id===item.drillId);
    if(!d) return '';
    return `<div class="plan-drill-row" draggable="true" data-idx="${i}">
      <span class="drag-handle" title="Dra for å flytte">⠿</span>
      <span class="plan-drill-num">${i+1}.</span>
      <div class="plan-drill-info">
        <span class="cat cat-${d.cat}" style="font-size:.68rem;">${CAT_LABELS[d.cat]}</span>
        <strong style="font-family:var(--fd);font-size:.9rem;">${d.name}</strong>
      </div>
      <span class="plan-drill-dur">
        <input type="number" value="${item.customDur||d.dur}" min="1" max="120"
          style="width:52px;background:var(--bg);border:1px solid var(--border);border-radius:3px;color:var(--a2);font-family:var(--fd);font-weight:700;font-size:.82rem;padding:2px 5px;text-align:center;"
          data-dur="${i}" oninput="updateDur(${i},this.value)"> min
      </span>
      <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:0 3px;" data-rm="${i}">✕</button>
    </div>`;
  }).join('');
  el.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',()=>{ currentPlanDrills.splice(parseInt(b.dataset.rm),1); renderPlanDrillList(); }));
  setupDragDrop(el);
  updateTotalTime();
}

function updateDur(idx, val) {
  currentPlanDrills[idx].customDur=parseInt(val)||1;
  updateTotalTime();
}

function updateTotalTime() {
  const drills=lsGet(LS_DRILLS);
  const total=currentPlanDrills.reduce((sum,item)=>{
    const d=drills.find(x=>x.id===item.drillId);
    return sum+(item.customDur||(d?d.dur:0));
  },0);
  const el=document.getElementById('planTotalTime');
  document.getElementById('totalMin').textContent=total;
  el.style.display=currentPlanDrills.length?'flex':'none';
}

function setupDragDrop(el) {
  let dragIdx=null;
  el.querySelectorAll('[draggable]').forEach(row=>{
    row.addEventListener('dragstart',()=>{ dragIdx=parseInt(row.dataset.idx); row.style.opacity='.4'; });
    row.addEventListener('dragend',()=>{ row.style.opacity='1'; dragIdx=null; });
    row.addEventListener('dragover',e=>{ e.preventDefault(); row.style.background='rgba(59,130,246,.1)'; });
    row.addEventListener('dragleave',()=>row.style.background='');
    row.addEventListener('drop',e=>{ e.preventDefault(); row.style.background='';
      const toIdx=parseInt(row.dataset.idx);
      if(dragIdx!==null&&dragIdx!==toIdx){
        const item=currentPlanDrills.splice(dragIdx,1)[0];
        currentPlanDrills.splice(toIdx,0,item);
        renderPlanDrillList();
      }
    });
  });
}

function openDrillPicker() {
  document.getElementById('pickerSearch').value='';
  document.getElementById('pickerCat').value='';
  renderPicker();
  openPop('pickerPop');
}

function renderPicker() {
  const search=document.getElementById('pickerSearch').value.toLowerCase();
  const cat=document.getElementById('pickerCat').value;
  let drills=lsGet(LS_DRILLS);
  if(cat) drills=drills.filter(d=>d.cat===cat);
  if(search) drills=drills.filter(d=>d.name.toLowerCase().includes(search));
  const el=document.getElementById('pickerGrid');
  if(!drills.length){ el.innerHTML='<div class="empty">Ingen øvelser.</div>'; return; }
  el.innerHTML=drills.map(d=>`
    <div class="drill-card" style="cursor:pointer;margin-bottom:5px;" data-pick="${d.id}">
      <div class="drill-meta">
        <span class="cat cat-${d.cat}">${CAT_LABELS[d.cat]}</span>
        <span style="font-size:.78rem;color:var(--muted);font-family:var(--fd);">⏱ ${d.dur} min</span>
        ${d.players?`<span style="font-size:.78rem;color:var(--muted);font-family:var(--fd);">👥 ${d.players}</span>`:''}
      </div>
      <div class="drill-title">${d.name}</div>
      ${d.desc?`<div class="drill-desc" style="font-size:.8rem;">${d.desc.slice(0,80)}${d.desc.length>80?'…':''}</div>`:''}
    </div>`).join('');
  el.querySelectorAll('[data-pick]').forEach(b=>b.addEventListener('click',()=>{
    const d=lsGet(LS_DRILLS).find(x=>x.id===b.dataset.pick);
    if(d){ currentPlanDrills.push({drillId:d.id,customDur:d.dur}); renderPlanDrillList(); closePop('pickerPop'); toast('+ '+d.name+' lagt til'); }
  }));
}

function savePlan() {
  const name=document.getElementById('pName').value.trim();
  if(!name){ toast('Gi planen et navn'); return; }
  if(!currentPlanDrills.length){ toast('Legg til minst én øvelse'); return; }
  const editId=document.getElementById('pEditId').value;
  const plan={
    id: editId||uid(),
    name,
    date: document.getElementById('pDate').value,
    goal: document.getElementById('pGoal').value.trim(),
    drills: JSON.parse(JSON.stringify(currentPlanDrills)),
    savedAt: new Date().toLocaleDateString('no')
  };
  const plans=lsGet(LS_PLANS);
  if(editId){ const i=plans.findIndex(p=>p.id===editId); if(i>=0) plans[i]=plan; else plans.unshift(plan); }
  else plans.unshift(plan);
  lsSet(LS_PLANS,plans);
  clearPlanForm();
  renderPlans();
  toast(editId?'✏ Plan oppdatert':'💾 Plan lagret: '+name);
}

function clearPlanForm() {
  ['pName','pDate','pGoal','pEditId'].forEach(id=>document.getElementById(id).value='');
  currentPlanDrills=[];
  renderPlanDrillList();
}

function editPlan(id) {
  const p=lsGet(LS_PLANS).find(p=>p.id===id); if(!p) return;
  document.getElementById('pName').value=p.name;
  document.getElementById('pDate').value=p.date||'';
  document.getElementById('pGoal').value=p.goal||'';
  document.getElementById('pEditId').value=p.id;
  currentPlanDrills=JSON.parse(JSON.stringify(p.drills));
  renderPlanDrillList();
  window.scrollTo({top:0,behavior:'smooth'});
  toast('✏ Redigerer: '+p.name);
}

function deletePlan(id) {
  const p=lsGet(LS_PLANS).find(p=>p.id===id); if(!p) return;
  confirmDlg('Slett "'+p.name+'"?', ()=>{ lsSet(LS_PLANS,lsGet(LS_PLANS).filter(x=>x.id!==id)); renderPlans(); toast('🗑 Slettet'); });
}

function viewPlan(id) {
  const p=lsGet(LS_PLANS).find(p=>p.id===id); if(!p) return;
  const drills=lsGet(LS_DRILLS);
  const total=p.drills.reduce((s,item)=>s+(item.customDur||0),0);
  document.getElementById('planViewTitle').textContent=p.name;
  document.getElementById('planViewContent').innerHTML=`
    <div style="font-size:.82rem;color:var(--muted);margin-bottom:10px;font-family:var(--fd);">
      ${p.date?'📅 '+p.date+' · ':''} ⏱ ${total} min totalt
      ${p.goal?`<br><span style="color:var(--text)">🎯 Mål: ${p.goal}</span>`:''}
    </div>
    ${p.drills.map((item,i)=>{
      const d=drills.find(x=>x.id===item.drillId);
      if(!d) return '';
      return `<div style="border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
          <div>
            <span style="font-family:var(--fd);font-weight:700;font-size:.78rem;color:var(--muted);">${i+1}.</span>
            <span class="cat cat-${d.cat}">${CAT_LABELS[d.cat]}</span>
            <strong style="font-family:var(--fd);font-size:.95rem;">${d.name}</strong>
          </div>
          <span style="font-family:var(--fd);font-weight:700;font-size:.85rem;color:var(--a2);">⏱ ${item.customDur} min${d.players?' · 👥 '+d.players:''}</span>
        </div>
        ${d.desc?`<div style="font-size:.83rem;color:var(--muted);margin-bottom:4px;">${d.desc}</div>`:''}
        ${d.tips?`<div style="font-size:.8rem;color:var(--teal);"><strong>Tips:</strong> ${d.tips}</div>`:''}
      </div>`;
    }).join('')}`;
  openPop('planViewPop');
}

let printPlanId=null;
function printPlan() {
  window.print();
}

function renderPlans() {
  const plans=lsGet(LS_PLANS);
  const el=document.getElementById('planList');
  if(!plans.length){ el.innerHTML='<div class="empty">Ingen treningsplaner lagret ennå.</div>'; return; }
  const drills=lsGet(LS_DRILLS);
  el.innerHTML=plans.map(p=>{
    const total=p.drills.reduce((s,item)=>s+(item.customDur||0),0);
    const catCounts={};
    p.drills.forEach(item=>{ const d=drills.find(x=>x.id===item.drillId); if(d){ catCounts[d.cat]=(catCounts[d.cat]||0)+1; } });
    return `<div class="plan-card">
      <div class="plan-header">
        <div>
          <div class="plan-title">${p.name}</div>
          <div class="plan-meta">
            ${p.date?'📅 '+p.date+' · ':''} ${p.drills.length} øvelser · ⏱ ${total} min
            ${p.goal?` · 🎯 ${p.goal}`:''}
          </div>
          <div style="margin-top:5px;">
            ${Object.entries(catCounts).map(([cat,n])=>`<span class="cat cat-${cat}">${CAT_LABELS[cat]} ×${n}</span>`).join('')}
          </div>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">
          <button class="btn blu" style="padding:5px 10px;font-size:.75rem;" data-view="${p.id}">👁 Vis</button>
          <button class="btn sec" style="padding:5px 10px;font-size:.75rem;" data-edit="${p.id}">✏</button>
          <button class="btn dng" style="padding:5px 9px;font-size:.75rem;" data-del="${p.id}">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('[data-view]').forEach(b=>b.addEventListener('click',()=>viewPlan(b.dataset.view)));
  el.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click',()=>editPlan(b.dataset.edit)));
  el.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>deletePlan(b.dataset.del)));
}

function openPop(id){ document.getElementById(id).classList.add('on'); }
function closePop(id){ document.getElementById(id).classList.remove('on'); }

let toastT;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('on'); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('on'),2300); }

// Init
renderDrills();
renderPlans();
</script>
</body>
</html>
